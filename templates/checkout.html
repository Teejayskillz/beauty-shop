{% extends 'base.html' %}

{% block title %}Checkout | Veloura Beauty{% endblock %}

{% block extra_css %}
<style>
    .checkout-wrapper {
        max-width: 1300px;
        margin: 0 auto;
        padding: 120px 2rem 5rem;
        display: grid;
        grid-template-columns: 1fr 1.1fr;
        gap: 5rem;
    }

    /* LEFT - SUMMARY */
    .summary-box {
        border: 1px solid var(--border-soft);
        padding: 2rem;
        background: var(--white);
        position: sticky;
        top: 110px;
    }

    .summary-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.4rem;
        margin-bottom: 1.5rem;
    }

    /* ITEMS */
    .summary-items {
        max-height: 380px;
        overflow: auto;
        margin-bottom: 1.5rem;
    }

    .summary-item {
        display: flex;
        justify-content: space-between;
        padding: .9rem 0;
        border-bottom: 1px solid #f2eae5;
    }

    .summary-name {
        font-size: .9rem;
    }

    .summary-meta {
        font-size: .8rem;
        color: var(--text-muted);
    }

    /* TOTAL */
    .summary-total {
        border-top: 1px solid var(--border-soft);
        padding-top: 1rem;
    }

    .row {
        display: flex;
        justify-content: space-between;
        margin-bottom: .7rem;
        font-size: .9rem;
    }

    .total {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.5rem;
        color: var(--deep-mauve);
    }

    /* RIGHT - FORM */
    .checkout-form {
        border: 1px solid var(--border-soft);
        padding: 2.5rem;
        background: var(--white);
    }

    .form-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.4rem;
        margin-bottom: 2rem;
    }

    /* INPUTS */
    .form-group {
        margin-bottom: 1.4rem;
    }

    .form-group label {
        display: block;
        font-size: .7rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: .5rem;
        color: var(--soft-brown);
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: .9rem 1rem;
        border: 1px solid var(--border-soft);
        font-family: 'Didact Gothic', sans-serif;
        font-size: .9rem;
        background: var(--ivory);
        transition: .3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--dusty-rose);
        background: var(--white);
    }

    /* PAYMENT */
    .payment-box {
        margin-top: 1.5rem;
        padding: 1rem;
        border: 1px solid var(--border-soft);
        display: flex;
        align-items: flex-start;
        gap: .7rem;
    }

    .payment-box input {
        margin-top: 4px;
    }

    .payment-info {
        font-size: .8rem;
        color: var(--text-muted);
    }

    /* BUTTON */
    .place-order {
        width: 100%;
        margin-top: 2rem;
        padding: 1.2rem;
        background: var(--deep-mauve);
        color: white;
        border: 2px solid var(--deep-mauve);
        letter-spacing: 3px;
        font-size: .75rem;
        text-transform: uppercase;
        cursor: pointer;
        transition: .3s;
    }

    .place-order:hover {
        background: transparent;
        color: var(--deep-mauve);
    }

    .place-order:disabled {
        opacity: .5;
        cursor: not-allowed;
    }

    /* EMPTY */
    .empty {
        text-align: center;
        padding: 3rem 0;
        color: var(--text-muted);
    }

    @media(max-width:900px) {
        .checkout-wrapper {
            grid-template-columns: 1fr;
            gap: 3rem;
        }

        .summary-box {
            position: relative;
            top: 0;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="checkout-wrapper">

    <!-- ORDER SUMMARY -->
    <div class="summary-box">

        <div class="summary-title">Order Summary</div>

        <div class="summary-items" id="cartItemsList">
            <div class="empty">Loading...</div>
        </div>

        <div class="summary-total">
            <div class="row">
                <span>Subtotal</span>
                <span>$<span id="subtotal">0.00</span></span>
            </div>
            <div class="row">
                <span>Delivery</span>
                <span>Free</span>
            </div>
            <div class="row total">
                <span>Total</span>
                <span>$<span id="totalAmount">0.00</span></span>
            </div>
        </div>

    </div>

    <!-- FORM -->
    <div class="checkout-form">

        <div class="form-title">Delivery Details</div>

        <form id="checkoutForm">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" required>
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="address" rows="3" required></textarea>
            </div>

            <div class="payment-box">
                <input type="radio" checked disabled>
                <div>
                    <div style="font-size:.85rem;">Pay on Delivery</div>
                    <div class="payment-info">Payment will be made when your order arrives.</div>
                </div>
            </div>

            <button type="submit" class="place-order">
                Place Order
            </button>

        </form>

    </div>

</div>

<script>

    function getCart() {
        try {
            return JSON.parse(localStorage.getItem('cart')) || [];
        } catch {
            return [];
        }
    }

    function displayCartItems() {
        const cart = getCart();
        const el = document.getElementById('cartItemsList');

        if (!cart.length) {
            el.innerHTML = '<div class="empty">Your cart is empty</div>';
            document.querySelector('.place-order').disabled = true;
            return;
        }

        let html = '';
        let total = 0;

        cart.forEach(item => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;

            html += `
        <div class="summary-item">
            <div>
                <div class="summary-name">${item.name}</div>
                <div class="summary-meta">$${item.price.toFixed(2)} × ${item.qty}</div>
            </div>
            <div>$${itemTotal.toFixed(2)}</div>
        </div>`;
        });

        el.innerHTML = html;
        document.getElementById('subtotal').innerText = total.toFixed(2);
        document.getElementById('totalAmount').innerText = total.toFixed(2);
    }

    function getCSRFToken() {
        return document.cookie.split('; ')
            .find(r => r.startsWith('csrftoken'))?.split('=')[1] || '';
    }

    document.getElementById('checkoutForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const cart = getCart();
        if (!cart.length) return;

        const btn = document.querySelector('.place-order');
        btn.innerText = 'Processing...';
        btn.disabled = true;

        const data = {
            name: fullName.value,
            email: email.value,
            phone: phone.value,
            address: address.value,
            cart: cart.map(i => ({ id: parseInt(i.id), qty: i.qty }))
        };

        try {
            const res = await fetch('/shop/create-order/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken()
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (result.success) {
                localStorage.removeItem('cart');
                showAlert("Order placed");

                setTimeout(() => {
                    window.location.href = `/shop/order/tracking/${result.tracking_code}/`;
                }, 1500);
            } else {
                showAlert("Error placing order", true);
                btn.innerText = 'Place Order';
                btn.disabled = false;
            }

        } catch {
            showAlert("Network error", true);
            btn.innerText = 'Place Order';
            btn.disabled = false;
        }
    });

    document.addEventListener('DOMContentLoaded', displayCartItems);

</script>
{% endblock %}
